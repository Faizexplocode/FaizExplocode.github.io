<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>TDC Summit Fest 2025 | Linktree Interaktif Statis</title>

    <link href="assets/img/tdcsummitfest.webp" rel="icon">

    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/vendor/aos/aos.css" rel="stylesheet">

    <style>
        :root {
            font-size: 100%; 
        }

        body {
            background-color: #c8c8c8;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .linktree-section {
            padding-top: 2.5rem;   
            padding-bottom: 2.5rem;
        }

        .lt-main-container {
            width: 92vw;           
            max-width: 36rem;      
            background-color: #ffffff;
            border-radius: 1.5rem; 
            box-shadow: 0 0.625rem 1.875rem rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .lt-main-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 11.25rem;     
            background: radial-gradient(circle at 15% 10%, rgba(180, 230, 220, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 85% 15%, rgba(255, 210, 200, 0.2) 0%, transparent 40%);
            pointer-events: none;
            z-index: 1;
        }

        .lt-header-ui {
            padding: 1.25rem 1.25rem 0;
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .lt-ui-btn {
            width: 2.25rem;       
            height: 2.25rem;
            background: rgba(255, 255, 255, 0.8);
            border: 0.0625rem solid #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 0.875rem;  
        }

        .lt-profile {
            text-align: center;
            padding: 0 1.25rem 1.5rem;
            position: relative;
            z-index: 2;
        }

        .lt-avatar {
            width: 5rem;         
            height: 5rem;
            border-radius: 50%;
            margin: 0 auto 0.75rem;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0.25rem 0.625rem rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .lt-avatar img {
            width: 80%;        
            height: auto;
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 0.25rem;
        }

        .profile-desc {
            font-size: 0.875rem;  
            color: #555;
            margin-bottom: 1rem;
        }

        .links-list {
            padding: 0 1rem 2rem;
            position: relative;
            z-index: 2;
        }

        .link-card-container {
            pointer-events: none;
            user-select: none;
            margin-bottom: 0.75rem;
        }

        .link-card-static {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border: 0.0625rem solid #f2f2f2;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            color: #000000;
            box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.05);
            transition: background-color 0.3s ease;
            pointer-events: auto;
        }

        .link-card-static:hover {
            background-color: #cccccc;
            color: #000000;
        }

        .link-title {
            flex: 1;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;    
            margin: 0;
            padding-left: 1.5rem; 
        }

        .menu-btn-static {
            color: #000000;
            opacity: 0.6;
            font-size: 1.125rem;  
        }
    </style>
</head>

<body>
    <main class="main">
        <section id="linktree" class="linktree-section">
            <div class="container" data-aos="fade-up">
                <div class="lt-main-container">
                    <div class="lt-header-ui">
                        <div class="lt-ui-btn"><i class="bi bi-asterisk"></i></div>
                        <div class="lt-ui-btn"><i class="bi bi-box-arrow-up"></i></div>
                    </div>

                    <div class="lt-profile">
                        <div class="lt-avatar">
                            <img src="assets/img/tdcsummitfest.webp" alt="Logo TDC">
                        </div>
                        <h2 class="profile-name">tdcsummitfest2025</h2>
                        <p class="profile-desc"><b>Open Registration TDC Summit Fest Competition 2025</b></p>

                        <div class="social-links text-dark">
                            <i class="bi bi-instagram mx-2 fs-5"></i>
                            <i class="bi bi-tiktok mx-2 fs-5"></i>
                        </div>
                    </div>

                    <div class="links-list">

                        <div class="link-card-container">
                            <div class="link-card-static">
                                <p class="link-title">Form Tenant</p>
                                <span class="menu-btn-static"><i class="bi bi-three-dots-vertical"></i></span>
                            </div>
                        </div>

                        <div class="link-card-container">
                            <div class="link-card-static">
                                <p class="link-title">Form Perfume Class Workshop</p>
                                <span class="menu-btn-static"><i class="bi bi-three-dots-vertical"></i></span>
                            </div>
                        </div>

                        <div class="link-card-container">
                            <div class="link-card-static">
                                <p class="link-title">Form DIY Liptint Workshop</p>
                                <span class="menu-btn-static"><i class="bi bi-three-dots-vertical"></i></span>
                            </div>
                        </div>

                        <div class="link-card-container">
                            <div class="link-card-static">
                                <p class="link-title">Form Entry (selain talkshow)</p>
                                <span class="menu-btn-static"><i class="bi bi-three-dots-vertical"></i></span>
                            </div>
                        </div>

                        <div class="link-card-container">
                            <div class="link-card-static">
                                <p class="link-title">Form Regist Talkshow</p>
                                <span class="menu-btn-static"><i class="bi bi-three-dots-vertical"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="assets/vendor/aos/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>

</body>

</html>
